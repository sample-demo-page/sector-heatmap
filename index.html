
<style>
  /* ============================================
     SIZE CONTROLS — EDIT THESE TO RESIZE
     ============================================ */
  :root {
    --card-width: 200px;
    --card-height: 90px;
    --grid-gap: 10px;
    --label-font: 13px;
    --value-font: 22px;
  }
  /* ============================================ */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .heatmap-wrapper {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 16px 20px 20px;
    width: fit-content;
    min-width: 100%;
  }

  .heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .heatmap-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-gain { background: #9fc25a; }
  .dot-flat { background: #d3d1c7; }
  .dot-loss { background: #e05a7a; }

  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(6, var(--card-width));
    gap: var(--grid-gap);
  }

  .tile {
    width: var(--card-width);
    height: var(--card-height);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1.5px solid transparent;
  }

  .tile-name {
    font-size: var(--label-font);
    font-weight: 500;
  }

  .tile-value {
    font-size: var(--value-font);
    font-weight: 600;
    line-height: 1;
  }

  .tile-value .pct {
    font-size: calc(var(--value-font) * 0.65);
    font-weight: 400;
  }
</style>

<div class="heatmap-wrapper">
  <div class="heatmap-header">
    <span class="heatmap-title">Sector Heatmap · KLCI Constituents</span>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-gain"></div> + gain</div>
      <div class="legend-item"><div class="legend-dot dot-flat"></div> flat</div>
      <div class="legend-item"><div class="legend-dot dot-loss"></div> - loss</div>
    </div>
  </div>
  <div class="heatmap-grid" id="grid"></div>
</div>

<script>
  const sectors = [
    { name: "Banking",      value: 1.4 },
    { name: "Plantation",   value: 0.9 },
    { name: "Tech",         value: 2.1 },
    { name: "Property",     value: -0.3 },
    { name: "Telco",        value: 0.4 },
    { name: "Energy",       value: -0.8 },
    { name: "Consumer",     value: 0.2 },
    { name: "Healthcare",   value: 1.1 },
    { name: "Construction", value: 0.6 },
    { name: "Industrial",   value: -0.1 },
    { name: "Transport",    value: 0.3 },
    { name: "REITs",        value: 0.7 },
  ];

  const maxGain = Math.max(...sectors.map(s => s.value));
  const maxLoss = Math.abs(Math.min(...sectors.map(s => s.value)));

  // Interpolate between two hex colors by t (0–1)
  function lerpColor(hex1, hex2, t) {
    const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const [r1,g1,b1] = parse(hex1);
    const [r2,g2,b2] = parse(hex2);
    const r = Math.round(r1 + (r2-r1)*t);
    const g = Math.round(g1 + (g2-g1)*t);
    const b = Math.round(b1 + (b2-b1)*t);
    return `rgb(${r},${g},${b})`;
  }

  // Gain: pale yellow-green (#f2f7e0) → rich green (#7db022)
  // Loss: pale pink (#fce8ee)         → deep rose (#c0305a)
  // Near-zero: neutral (#f0ede6)
  function tileColors(value) {
    const threshold = 0.05;
    if (Math.abs(value) <= threshold) {
      return { bg: "#f0ede6", border: "#dbd8d0", textName: "#777", textVal: "#555" };
    }
    if (value > 0) {
      const t = Math.min(value / maxGain, 1);
      const bg = lerpColor("#edf7d0", "#7db022", t);
      const border = lerpColor("#d0e89a", "#5a8810", t);
      const textName = lerpColor("#6a8a30", "#2a4a05", t);
      const textVal  = lerpColor("#4a7a10", "#1e3a02", t);
      return { bg, border, textName, textVal };
    } else {
      const t = Math.min(Math.abs(value) / maxLoss, 1);
      const bg = lerpColor("#fce8ee", "#c0305a", t);
      const border = lerpColor("#f0b8c8", "#8a1a3a", t);
      const textName = lerpColor("#a03060", "#5a0a22", t);
      const textVal  = lerpColor("#b02050", "#4a0818", t);
      return { bg, border, textName, textVal };
    }
  }

  const grid = document.getElementById("grid");
  sectors.forEach(s => {
    const c = tileColors(s.value);
    const sign = s.value > 0 ? "+" : "";
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.style.background = c.bg;
    tile.style.borderColor = c.border;
    tile.innerHTML = `
      <span class="tile-name" style="color:${c.textName}">${s.name}</span>
      <span class="tile-value" style="color:${c.textVal}">${sign}${s.value.toFixed(1)}<span class="pct"> %</span></span>
    `;
    grid.appendChild(tile);
  });
</script>
