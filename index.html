
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============================================
     SIZE CONTROLS
     ============================================ */
  :root {
    --card-width: 180px;
    --card-height: 80px;
    --grid-gap: 10px;
    --label-font: 13px;
    --value-font: 18px;

    /* ============================================
       LEGEND POSITION CONTROLS
       --legend-justify: flex-start | center | flex-end
       --legend-margin-top: push down from title
       --legend-gap: space between items
    ============================================ */
    --legend-justify: flex-start;
    --legend-margin-top: 0px;
    --legend-gap: 14px;

    /* ============================================
       BRAND COLORS
    ============================================ */
    --color-gain: #CFDD07;
    --color-loss: #E1025A;
    --color-flat: #F1F1F1;

    /* ============================================
       FONT
    ============================================ */
    --font: 'Poppins', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }

  .heatmap-wrapper {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 14px 16px 16px;
    width: fit-content;
    min-width: 100%;
  }

  .heatmap-header {
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
    gap: 6px;
  }

  .heatmap-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
  }

  .legend {
    display: flex;
    justify-content: var(--legend-justify);
    align-items: center;
    gap: var(--legend-gap);
    margin-top: var(--legend-margin-top);
    font-size: 14px;
    color: var(--color-text-secondary);
  }

  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-gain { background: var(--color-gain); }
  .dot-flat { background: #aaa; }
  .dot-loss { background: var(--color-loss); }

  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(6, var(--card-width));
    gap: var(--grid-gap);
  }

  .tile {
    width: var(--card-width);
    height: var(--card-height);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1.5px solid transparent;
  }

  .tile-name {
    font-size: var(--label-font);
    font-weight: 500;
  }

  .tile-value {
    font-size: var(--value-font);
    font-weight: 600;
    line-height: 1;
  }

  .tile-value .pct {
    font-size: calc(var(--value-font) * 0.62);
    font-weight: 400;
  }
</style>

<div class="heatmap-wrapper">
  <div class="heatmap-header">
    <span class="heatmap-title">Sector Heatmap · KLCI Constituents</span>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-gain"></div> + gain</div>
      <div class="legend-item"><div class="legend-dot dot-flat"></div> flat</div>
      <div class="legend-item"><div class="legend-dot dot-loss"></div> - loss</div>
    </div>
  </div>
  <div class="heatmap-grid" id="grid"></div>
</div>

<script>
  const sectors = [
    { name: "Banking",      value: 1.4  },
    { name: "Plantation",   value: 0.9  },
    { name: "Tech",         value: 2.1  },
    { name: "Property",     value: -0.3 },
    { name: "Telco",        value: 0.4  },
    { name: "Energy",       value: -0.8 },
    { name: "Consumer",     value: 0.2  },
    { name: "Healthcare",   value: 1.1  },
    { name: "Construction", value: 0.6  },
    { name: "Industrial",   value: -0.1 },
    { name: "Transport",    value: 0.3  },
    { name: "REITs",        value: 0.7  },
  ];

  const maxGain = Math.max(...sectors.map(s => s.value));
  const maxLoss = Math.abs(Math.min(...sectors.map(s => s.value)));

  function lerpColor(hex1, hex2, t) {
    const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const [r1,g1,b1] = parse(hex1);
    const [r2,g2,b2] = parse(hex2);
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  function textColor(hex1, hex2, t) {
    const mix = lerpColor(hex1, hex2, t);
    const m = mix.match(/\d+/g).map(Number);
    const lum = 0.299*m[0] + 0.587*m[1] + 0.114*m[2];
    return lum > 140 ? "#333" : "#fff";
  }

  function tileColors(value) {
    const threshold = 0.05;
    if (Math.abs(value) <= threshold) {
      return { bg: "#F1F1F1", border: "#d8d8d8", textName: "#666", textVal: "#444" };
    }
    if (value > 0) {
      const t = Math.min(value / maxGain, 1);
      const bg     = lerpColor("#eef5a0", "#CFDD07", t);
      const border = lerpColor("#d5e040", "#9aa000", t);
      const txt    = textColor("#eef5a0", "#CFDD07", t);
      return { bg, border, textName: txt, textVal: txt };
    } else {
      const t = Math.min(Math.abs(value) / maxLoss, 1);
      const bg     = lerpColor("#fce8ee", "#E1025A", t);
      const border = lerpColor("#f0a8c0", "#a00040", t);
      const txt    = textColor("#fce8ee", "#E1025A", t);
      return { bg, border, textName: txt, textVal: txt };
    }
  }

  const grid = document.getElementById("grid");
  sectors.forEach(s => {
    const c = tileColors(s.value);
    const sign = s.value > 0 ? "+" : "";
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.style.background = c.bg;
    tile.style.borderColor = c.border;
    tile.innerHTML = `
      <span class="tile-name" style="color:${c.textName}">${s.name}</span>
      <span class="tile-value" style="color:${c.textVal}">${sign}${s.value.toFixed(1)}<span class="pct"> %</span></span>
    `;
    grid.appendChild(tile);
  });
</script>
